<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Message received - Digital Hive</title>
  <meta name="description" content="Thanks for reaching out. We'll connect you with the right team within 24 hours." />
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/site.css" />
  <style>
    .ty-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 72px);
      padding: var(--space-12) var(--space-4);
      text-align: center;
    }
    .ty-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--dh-orange) 12%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-5);
      color: var(--dh-orange);
    }
    .ty-shell h1 {
      font-size: var(--fs-36);
      margin: 0 0 var(--space-3);
    }
    .ty-shell p {
      font-size: var(--fs-18);
      color: var(--fg-2);
      max-width: 480px;
      margin: 0 auto var(--space-8);
    }
    .ty-links {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>

  <!-- NAVIGATION (mega menu injected by site.js) -->
  <header class="nav" data-screen-label="Navigation">
    <div class="container nav__inner">
      <a class="nav__logo" href="Home.html" aria-label="Digital Hive home" style="border-bottom:none;">
        <img src="assets/logo-colour.svg" alt="Digital Hive" />
      </a>
      <nav aria-label="Primary">
        <ul class="nav__links"></ul>
      </nav>
      <div class="nav__cta">
        <a class="btn btn--primary" href="Demo.html">Book a demo</a>
        <button type="submit" class="nav__toggle" data-mobile-toggle aria-label="Open menu" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
        </button>
      </div>
    </div>
    <div class="container mobile-menu" data-mobile-menu></div>
  </header>

  <main>
    <div class="ty-shell">
      <div class="ty-icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1>Message received.</h1>
      <p>We'll route your note to the right person and get back to you within 24 hours. No auto-responder — a real human.</p>
      <div class="ty-links">
        <a class="btn btn--primary" href="Home.html">Back to home</a>
        <a class="btn btn--ghost" href="FAQ.html">Browse the FAQ</a>
      </div>
    </div>
  </main>

  <script src="scripts/site.js"></script>
</body>
</html>
