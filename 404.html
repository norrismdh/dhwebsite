<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <title>Page not found &mdash; Digital Hive</title>
  <meta name="description" content="The page you're looking for doesn't exist. Head back to Digital Hive." />
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/site.css" />
  <link rel="stylesheet" href="styles/consent.css" />
  <style>

    /* ── Shell ───────────────────────────────────────────────────── */
    .nf-shell {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 72px);
      padding: var(--space-12) var(--space-4);
      text-align: center;
      overflow: hidden;
    }

    /* ── Floating hexagons ───────────────────────────────────────── */
    .nf-hex {
      position: absolute;
      pointer-events: none;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      opacity: 0;
      animation: hex-appear 0.7s ease forwards, hex-float 7s ease-in-out infinite;
    }
    .nf-hex--1 { width:110px; height:126px; background:var(--dh-orange); top:8%;    left:6%;   animation-delay:0.2s, 0.2s; animation-duration:0.7s, 8s; }
    .nf-hex--2 { width: 60px; height: 68px; background:var(--dh-yellow); top:12%;   right:8%;  animation-delay:0.5s, 0.5s; animation-duration:0.7s, 6s; }
    .nf-hex--3 { width: 80px; height: 92px; background:var(--dh-navy);   bottom:14%;left:10%;  animation-delay:0.8s, 0.8s; animation-duration:0.7s, 9s; }
    .nf-hex--4 { width: 44px; height: 50px; background:var(--dh-orange); bottom:18%;right:7%;  animation-delay:1.0s, 1.0s; animation-duration:0.7s, 7s; }
    .nf-hex--5 { width: 30px; height: 34px; background:var(--dh-yellow); top:52%;   left:4%;   animation-delay:1.2s, 1.2s; animation-duration:0.7s, 5s; }
    .nf-hex--6 { width: 24px; height: 28px; background:var(--dh-navy);   top:28%;   right:4%;  animation-delay:0.65s,0.65s;animation-duration:0.7s, 8s; }
    .nf-hex--7 { width: 18px; height: 20px; background:var(--dh-orange); bottom:32%;left:20%;  animation-delay:1.4s, 1.4s; animation-duration:0.7s, 6s; }

    @keyframes hex-appear {
      from { opacity: 0; transform: scale(0.4) rotate(-15deg); }
      to   { opacity: 0.15; transform: scale(1) rotate(0deg); }
    }
    @keyframes hex-float {
      0%,100% { transform: translateY(0)    rotate(0deg);  }
      33%     { transform: translateY(-16px) rotate(5deg);  }
      66%     { transform: translateY(9px)  rotate(-3deg); }
    }

    /* ── 404 number ──────────────────────────────────────────────── */
    .nf-num {
      font-size: clamp(100px, 18vw, 180px);
      font-weight: var(--fw-bold);
      color: var(--dh-navy);
      line-height: 1;
      letter-spacing: -0.04em;
      margin: 0 0 var(--space-5);
      animation: nf-rise 0.6s cubic-bezier(0.23, 1, 0.32, 1) both,
                 nf-hover 4s ease-in-out 0.6s infinite;
    }
    .nf-num__zero { color: var(--dh-orange); }

    @keyframes nf-rise {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes nf-hover {
      0%,100% { transform: translateY(0);    }
      50%     { transform: translateY(-10px); }
    }

    /* ── Copy ────────────────────────────────────────────────────── */
    .nf-eyebrow {
      animation: nf-fade-up 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.25s both;
    }
    .nf-title {
      font-size: clamp(var(--fs-28), 4vw, var(--fs-48));
      font-weight: var(--fw-bold);
      color: var(--dh-navy);
      letter-spacing: -0.025em;
      margin: var(--space-2) 0 var(--space-3);
      animation: nf-fade-up 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.38s both;
    }
    .nf-desc {
      font-size: var(--fs-18);
      color: var(--fg-2);
      max-width: 440px;
      margin: 0 auto var(--space-7);
      animation: nf-fade-up 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.5s both;
    }
    .nf-links {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      justify-content: center;
      animation: nf-fade-up 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.62s both;
    }

    @keyframes nf-fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Reduced motion ──────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .nf-hex      { animation: none; opacity: 0.1; }
      .nf-num      { animation: none; }
      .nf-eyebrow,
      .nf-title,
      .nf-desc,
      .nf-links    { animation: none; }
    }

  </style>
</head>
<body>

  <header class="nav" data-screen-label="Navigation"></header>

  <main>
    <div class="nf-shell">

      <!-- Decorative floating hexagons -->
      <span class="nf-hex nf-hex--1" aria-hidden="true"></span>
      <span class="nf-hex nf-hex--2" aria-hidden="true"></span>
      <span class="nf-hex nf-hex--3" aria-hidden="true"></span>
      <span class="nf-hex nf-hex--4" aria-hidden="true"></span>
      <span class="nf-hex nf-hex--5" aria-hidden="true"></span>
      <span class="nf-hex nf-hex--6" aria-hidden="true"></span>
      <span class="nf-hex nf-hex--7" aria-hidden="true"></span>

      <p class="nf-num" aria-hidden="true">4<span class="nf-num__zero">0</span>4</p>

      <span class="eyebrow nf-eyebrow">Page not found</span>
      <h1 class="nf-title">You took a wrong turn in the data</h1>
      <p class="nf-desc">The link you followed may be broken, or the page may have moved. Let's get you back on track</p>

      <div class="nf-links">
        <button class="btn btn--ghost" onclick="history.back()">Go back</button>
        <a class="btn btn--primary" href="/Home">
          Take me home
          <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
        <a class="btn btn--ghost" href="/Product">See the platform</a>
        <a class="btn btn--ghost" href="/Demo">Book a demo</a>
      </div>

    </div>
  </main>

  <footer class="footer" data-screen-label="Footer"></footer>

  <script src="scripts/consent.js"></script>
  <script src="scripts/site.js"></script>
</body>
</html>
