<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="AICPA SOC for Service Organizations">
  <defs>
    <radialGradient id="sg-outer" cx="40%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#29C6F0"/>
      <stop offset="100%" stop-color="#0094C8"/>
    </radialGradient>
    <radialGradient id="sg-inner" cx="40%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#1A7FBF"/>
      <stop offset="100%" stop-color="#0A4A8A"/>
    </radialGradient>
    <!-- arc paths for curved text -->
    <path id="sg-arc-bottom" d="M 30,118 A 72,72 0 0,0 170,118" fill="none"/>
    <path id="sg-arc-right"  d="M 156,56 A 72,72 0 0,1 156,144" fill="none"/>
  </defs>

  <!-- outer ring -->
  <circle cx="100" cy="100" r="98"  fill="url(#sg-outer)"/>
  <!-- inner disc -->
  <circle cx="100" cy="100" r="76"  fill="url(#sg-inner)"/>

  <!-- AICPA -->
  <text x="100" y="84"
        text-anchor="middle"
        fill="#ffffff"
        font-family="Arial,Helvetica,sans-serif"
        font-size="30"
        font-weight="700"
        letter-spacing="-0.5">AICPA</text>

  <!-- dividing rule -->
  <line x1="38" y1="92" x2="162" y2="92" stroke="#ffffff" stroke-width="1.8" stroke-opacity="0.7"/>

  <!-- SOC -->
  <text x="100" y="130"
        text-anchor="middle"
        fill="#ffffff"
        font-family="Arial,Helvetica,sans-serif"
        font-size="38"
        font-weight="700"
        letter-spacing="1">SOC</text>

  <!-- URL -->
  <text x="100" y="148"
        text-anchor="middle"
        fill="rgba(255,255,255,0.75)"
        font-family="Arial,Helvetica,sans-serif"
        font-size="9.5"
        letter-spacing="0.3">aicpa.org/soc4so</text>

  <!-- curved bottom text: SOC for Service Organizations -->
  <text fill="rgba(255,255,255,0.82)"
        font-family="Arial,Helvetica,sans-serif"
        font-size="9"
        font-style="italic"
        letter-spacing="0.2">
    <textPath href="#sg-arc-bottom" startOffset="50%" text-anchor="middle">SOC for Service Organizations</textPath>
  </text>

  <!-- curved right text: Service Organizations -->
  <text fill="#ffffff"
        font-family="Arial,Helvetica,sans-serif"
        font-size="9"
        font-weight="700"
        letter-spacing="0.4">
    <textPath href="#sg-arc-right" startOffset="50%" text-anchor="middle">Service Organizations</textPath>
  </text>

  <!-- ™ -->
  <text x="186" y="158"
        fill="#ffffff"
        font-family="Arial,Helvetica,sans-serif"
        font-size="10"
        font-weight="400">™</text>
</svg>
